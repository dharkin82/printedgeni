<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safety Sign Builder — PrintEdge NI</title>
<style>
.site-nav-bar{background:#0f1014;border-bottom:1px solid #3d4560;padding:0 16px;height:44px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;font-family:'Inter',system-ui,sans-serif}
.site-nav-bar a{color:#f5a623;text-decoration:none;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.site-nav-bar a:hover{color:#e8920a}
.site-nav-bar .brand{color:#f0f4ff;font-size:14px;font-weight:700;text-decoration:none}
.site-nav-bar .brand span{color:#f5a623}
</style>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#12151f;--surface:#1a1f30;--card:#1f2640;
  --border:#2a3555;--border2:#3a4f7a;--borderacc:#4fc3f7;
  --text:#dde6f5;--muted:#6a85b0;--dimmed:#3a4a6a;
  --accent:#4fc3f7;--acc2:#0288d1;
  --r:6px;--font:'Segoe UI',system-ui,Arial,sans-serif;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column}

/* ── TOP BAR ── */
.topbar{background:var(--surface);border-bottom:2px solid var(--border);padding:0;display:flex;align-items:stretch;flex-shrink:0;min-height:48px}
.topbar-brand{display:flex;align-items:center;gap:10px;padding:0 16px;border-right:1px solid var(--border)}
.topbar-brand h1{font-size:14px;font-weight:700;color:var(--accent);white-space:nowrap}
/* Standard selector tabs */
.std-tabs{display:flex;align-items:stretch;gap:0;flex:1;overflow-x:auto}
.std-tab{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 18px;border:none;border-bottom:3px solid transparent;background:transparent;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;transition:all .15s;border-right:1px solid var(--border);gap:2px}
.std-tab:hover{background:rgba(79,195,247,.06);color:var(--text)}
.std-tab.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(79,195,247,.08)}
.std-tab .std-name{font-size:12px;font-weight:800}
.std-tab .std-sub{font-size:9px;font-weight:400;opacity:.7}
/* active std colour stripe per standard */
.std-tab[data-std="iso"].active{border-bottom-color:#4fc3f7}
.std-tab[data-std="uk"].active{border-bottom-color:#CF101A}
.std-tab[data-std="eu"].active{border-bottom-color:#003399}
.std-tab[data-std="ansi"].active{border-bottom-color:#E87722}
.std-tab[data-std="ul"].active{border-bottom-color:#009a44}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden;min-height:0}

/* ── SIDEBAR ── */
.sidebar{width:185px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-hdr{padding:8px 10px 4px;font-size:9px;font-weight:700;color:var(--dimmed);letter-spacing:.1em;text-transform:uppercase}
.cat-btn{display:flex;align-items:center;gap:7px;padding:7px 10px;margin:1px 4px;border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:500;border-radius:var(--r);cursor:pointer;text-align:left;transition:all .13s;width:calc(100% - 8px)}
.cat-btn:hover{background:rgba(79,195,247,.07);color:var(--text)}
.cat-btn.active{background:rgba(79,195,247,.14);color:var(--accent)}
.cat-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.cat-count{margin-left:auto;font-size:9px;color:var(--dimmed);font-family:monospace}
.cat-btn.active .cat-count{color:var(--accent)}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;min-width:0}
.std-info-bar{border-radius:var(--r);padding:8px 12px;font-size:10px;line-height:1.6;border:1px solid var(--border)}
.sign-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.sign-card{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:transform .1s,border-color .15s,box-shadow .15s;background:#111}
.sign-card:hover{transform:translateY(-2px);border-color:var(--border2);box-shadow:0 4px 14px rgba(0,0,0,.4)}
.sign-card.selected{border:2px solid var(--accent)}
.sign-prev{width:100%;aspect-ratio:4/3;display:flex;align-items:stretch;justify-content:stretch;padding:0;overflow:hidden;font-family:Arial,Helvetica,sans-serif;background:#111}
.sign-prev>div{width:100%;height:100%;flex:1}
.sign-prev.wide{aspect-ratio:3/2}
.sign-lbl{font-size:9.5px;color:var(--muted);padding:3px 6px 1px;text-align:center;background:var(--surface);border-top:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sign-ref{font-size:8px;color:var(--accent);font-family:monospace;padding:0 6px 3px;text-align:center;background:var(--surface)}

/* ── EDITOR ── */
.editor{width:292px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.ed-hdr{padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.ed-hdr-title{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:1px}
.ed-hdr-ref{font-size:9px;color:var(--muted);font-family:monospace}
.ed-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.fgrp{display:flex;flex-direction:column;gap:4px}
.fgrp label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.fgrp input,.fgrp textarea,.fgrp select{background:var(--card);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:12px;padding:6px 8px;font-family:var(--font);width:100%;resize:vertical}
.fgrp input:focus,.fgrp textarea:focus{outline:none;border-color:var(--accent)}
.hint{font-size:10px;color:var(--dimmed);line-height:1.4}
hr.div{border:none;border-top:1px solid var(--border);margin:2px 0}
.sz-row{display:flex;gap:4px;flex-wrap:wrap}
.sz-btn{display:flex;flex-direction:column;align-items:center;padding:4px 7px;border:1px solid var(--border);border-radius:var(--r);background:transparent;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;line-height:1.2;transition:all .12s;min-width:36px}
.sz-btn span{font-size:7.5px;font-weight:400;margin-top:1px;white-space:nowrap}
.sz-btn:hover{border-color:var(--border2);color:var(--text)}
.sz-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(79,195,247,.1)}
.sz-btn.active span{color:var(--accent)}
.csz{display:none;gap:5px;align-items:center;margin-top:4px}
.csz input{width:70px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:12px;padding:5px 7px}
.csz input:focus{outline:none;border-color:var(--accent)}
.csz span{font-size:10px;color:var(--muted)}
.ori-row{display:flex;gap:4px}
.ori-btn{flex:1;padding:5px 4px;border:1px solid var(--border);border-radius:var(--r);background:transparent;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;text-align:center;transition:all .12s}
.ori-btn:hover{border-color:var(--border2);color:var(--text)}
.ori-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(79,195,247,.1)}
.btn-row{display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:7px 12px;border-radius:var(--r);border:1px solid var(--border2);background:transparent;color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:background .13s;white-space:nowrap}
.btn:hover{background:rgba(255,255,255,.05)}
.btn-p{background:var(--acc2);border-color:var(--accent);color:#fff}
.btn-p:hover{background:#039be5}
.btn-g{background:#1b4d2a;border-color:#2e7d32;color:#a5d6a7}
.btn-g:hover{background:#1e5631}
.btn-sm{padding:5px 9px;font-size:11px}
.out-sec{border-top:1px solid var(--border);padding-top:10px;display:flex;flex-direction:column;gap:8px}
.out-prev{background:#0b0e18;border:1px solid var(--border);border-radius:var(--r);padding:10px;overflow:auto;display:flex;align-items:flex-start;min-height:60px}
.empty-ed{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);text-align:center;padding:24px}
.empty-ed .ico{font-size:34px;opacity:.35}
.empty-ed p{font-size:11px;line-height:1.6}
.grid-hdr{font-size:12px;font-weight:700;color:var(--text)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>

</div>

/* ═══════════════════════════════════════════════
   CATEGORY METADATA PER STANDARD

function makeCats(std){
  const isISO=['iso','uk','eu'].includes(std);
  if(isISO) return {
    warning:    {label:'Warning',              dot:'#FFD700'},
    prohibition:{label:'Prohibition',          dot:'#D40000'},
    mandatory:  {label:'Mandatory',            dot:'#005EB8'},
    safe:       {label:'Safe Condition / Emergency',dot:'#007A4C'},
    fire:       {label:'Fire Equipment',       dot:'#D40000'},
    panel:      {label:'Panel Labels',         dot:'#4fc3f7'},
  };
  const C=STDS[std].col;
  return {
    danger: {label:'DANGER',  dot:C.red},
    warning:{label:'WARNING', dot:C.orange},
    caution:{label:'CAUTION', dot:C.yellow},
    notice: {label:'NOTICE',  dot:C.blue},
    safe:   {label:'SAFETY',  dot:C.green},
    panel:  {label:'Panel Labels', dot:'#4fc3f7'},
  };
}

/* ═══════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════ */
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function nl(s){return esc(s||'').replace(/\n/g,'<br>')}
function svg(name,color,px){
  return `<svg viewBox="0 0 24 24" width="${px}" height="${px}" style="color:${color};flex-shrink:0;overflow:visible">${P[name]||P.warning}</svg>`;
}
function alertSym(px,col){
  return `<svg viewBox="0 0 24 24" width="${px}" height="${px}" style="flex-shrink:0"><polygon points="12,2 2,22 22,22" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round"/><line x1="12" y1="9" x2="12" y2="15" stroke="${col}" stroke-width="2"/><circle cx="12" cy="18.5" r="1.2" fill="${col}"/></svg>`;
}

/* ═══════════════════════════════════════════════
   THUMBNAIL BUILDERS
═══════════════════════════════════════════════ */
function thumbISO(s, cat, col){
  const C=col;
  if(cat==='warning'){
    return `<div style="width:100%;height:100%;background:${C.yellow};display:flex;align-items:center;justify-content:center;border:3px solid ${C.black};position:relative;overflow:hidden">
      <svg viewBox="0 0 100 87" style="width:80%;height:80%;max-width:90px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)">
        <polygon points="50,5 96,82 4,82" fill="${C.yellow}" stroke="${C.black}" stroke-width="6" stroke-linejoin="round"/>
      </svg>
      <div style="position:relative;z-index:2;margin-top:4%">${svg(s.sym,C.black,30)}</div>
    </div>`;
  }
  if(cat==='prohibition'){
    return `<div style="width:100%;height:100%;background:${C.white};display:flex;align-items:center;justify-content:center;border:3px solid ${C.red};position:relative;overflow:hidden">
      <svg viewBox="0 0 100 100" style="width:80%;height:80%;max-width:90px;position:absolute">
        <circle cx="50" cy="50" r="46" fill="${C.white}" stroke="${C.red}" stroke-width="10"/>
      </svg>
      <div style="position:relative;z-index:2">${svg(s.sym,C.black,30)}</div>
      <svg viewBox="0 0 100 100" style="width:80%;height:80%;max-width:90px;position:absolute;pointer-events:none">
        <line x1="20" y1="20" x2="80" y2="80" stroke="${C.red}" stroke-width="10"/>
      </svg>
    </div>`;
  }
  if(cat==='mandatory'){
    return `<div style="width:100%;height:100%;background:${C.blue};display:flex;align-items:center;justify-content:center;overflow:hidden">
      ${svg(s.sym,C.white,38)}
    </div>`;
  }
  if(cat==='safe'){
    return `<div style="width:100%;height:100%;background:${C.green};display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px">
      ${svg(s.sym,C.white,38)}
    </div>`;
  }
  if(cat==='fire'){
    return `<div style="width:100%;height:100%;background:${C.red};display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px">
      ${svg(s.sym,C.white,38)}
    </div>`;
  }
  return '';
}

function thumbANSI(s, col){
  const rule=STDS[currentStd].rules?.[s.cat]||{};
  const hc=rule.headerColor||col.red;
  const ht=rule.headerText||'#fff';
  const sw=rule.signalWord||s.code;
  const addAlert=(sw!=='NOTICE'&&sw!=='SAFETY');
  return `<div style="width:100%;height:100%;background:#fff;border:2px solid ${hc};display:flex;flex-direction:column;font-family:Arial,sans-serif;overflow:hidden">
    <div style="background:${hc};color:${ht};font-weight:900;font-size:9px;letter-spacing:.08em;padding:3px 6px;display:flex;align-items:center;gap:3px;flex-shrink:0">

      ${svg(s.sym,hc,24)}

function thumbPanel(s){

  if(t==='door-warning') return `<div style="${b}background:#FFD700;border:3px solid #0A0A0A;position:relative;overflow:hidden"><div style="position:absolute;inset:0;background:repeating-linear-gradient(-45deg,rgba(0,0,0,.13) 0,rgba(0,0,0,.13) 8px,transparent 8px,transparent 16px)"></div><div style="background:#0A0A0A;color:#FFD700;font-size:7px;font-weight:900;padding:2px 4px;text-align:center;position:relative;z-index:2">⚡ ${esc(v.voltage)}</div><div style="flex:1;display:flex;align-items:center;justify-content:center;position:relative;z-index:2;padding:3px;border:2px solid #0A0A0A;margin:2px"><div style="font-size:7px;font-weight:900;color:#0A0A0A;text-align:center">${esc(v.main)}</div></div></div>`;
  if(t==='circuit-id') return `<div style="${b}background:#fff;border:2px solid #0A0A0A"><div style="background:#0A0A0A;color:#fff;font-size:7px;font-weight:900;padding:2px 4px;text-align:center">CIRCUIT ID</div><div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px"><div style="font-size:18px;font-weight:900;color:#0A0A0A">${esc(v.id)}</div><div style="font-size:7px;color:#0A0A0A">${esc(v.desc)}</div><div style="font-size:9px;font-weight:900;color:#D40000">${esc(v.amps)}</div></div></div>`;
  if(t==='breaker-label') return `<div style="${b}background:#fff;border:2px solid #0A0A0A"><div style="background:#0A0A0A;color:#fff;font-size:7px;font-weight:900;padding:2px 4px;text-align:center">${esc(v.panel)}</div><div style="flex:1;padding:4px;display:flex;flex-direction:column;justify-content:center;gap:2px"><div style="font-size:7px;color:#0A0A0A">${esc(v.location)}</div><div style="font-size:7px;color:#D40000;font-weight:700">${esc(v.voltage)}</div><div style="display:flex;gap:1px;margin-top:2px">${['L1','L2','L3','N','E'].map((l,i)=>`<div style="flex:1;background:${i<4?'#FFD700':'#ddd'};border:1px solid #0A0A0A;font-size:5.5px;font-weight:700;color:#0A0A0A;text-align:center;padding:1px 0">${l}</div>`).join('')}</div></div></div>`;
  if(t==='lockout') return `<div style="${b}background:#FFD700;border:3px solid #0A0A0A;position:relative;overflow:hidden"><div style="position:absolute;inset:0;background:repeating-linear-gradient(-45deg,rgba(0,0,0,.13) 0,rgba(0,0,0,.13) 8px,transparent 8px,transparent 16px)"></div><div style="background:#0A0A0A;color:#FFD700;font-size:7px;font-weight:900;padding:2px 4px;text-align:center;position:relative;z-index:2">🔒 LOCKOUT/TAGOUT</div><div style="flex:1;display:flex;align-items:center;justify-content:center;position:relative;z-index:2;padding:4px;border:2px solid #0A0A0A;margin:2px"><div style="font-size:7px;font-weight:900;color:#0A0A0A;text-align:center">${esc(v.main)}</div></div></div>`;
  if(t==='arc-flash') return `<div style="${b}background:#fff;border:3px solid #D40000"><div style="background:#D40000;color:#fff;font-size:7px;font-weight:900;padding:2px 4px;text-align:center">⚡ ARC FLASH HAZARD</div><div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px;gap:1px"><div style="font-size:14px;font-weight:900;color:#D40000">${esc(v.voltage)}</div><div style="font-size:6.5px;color:#0A0A0A">Boundary: ${esc(v.boundary)}</div></div></div>`;
  if(t==='isolator') return `<div style="${b}background:#fff;border:2px solid #005EB8"><div style="background:#005EB8;color:#fff;font-size:7px;font-weight:900;padding:2px 4px;text-align:center">ISOLATOR / SWITCH</div><div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px"><div style="font-size:16px;font-weight:900;color:#005EB8">${esc(v.id)}</div><div style="font-size:7px;color:#0A0A0A">${esc(v.desc)}</div><div style="font-size:8px;font-weight:900;color:#D40000">${esc(v.voltage)}</div></div></div>`;
  if(t==='consumer-unit') return `<div style="${b}background:#fff;border:2px solid #0A0A0A"><div style="background:#0A0A0A;color:#fff;font-size:7px;font-weight:900;padding:2px 4px;text-align:center">CONSUMER UNIT</div><div style="flex:1;padding:4px;display:flex;flex-direction:column;justify-content:center;gap:2px"><div style="font-size:7px;font-weight:700;color:#0A0A0A">${esc(v.address)}</div><div style="font-size:7px;color:#D40000;font-weight:700">${esc(v.supply)}</div><div style="font-size:6.5px;color:#555">Installed: ${esc(v.install)}</div></div></div>`;
  if(t==='no-access') return `<div style="${b}background:#fff;border:3px solid #D40000"><div style="background:#D40000;color:#fff;font-size:7px;font-weight:900;padding:2px 4px;text-align:center">⛔ NO ACCESS</div><div style="flex:1;display:flex;align-items:center;justify-content:center;padding:4px"><div style="font-size:7px;font-weight:900;color:#D40000;text-align:center">${esc(v.main)}</div></div></div>`;
  return '';
}

/* ═══════════════════════════════════════════════
   OUTPUT BUILDERS (full size)
═══════════════════════════════════════════════ */
function buildOutput(s,cat,v,w,h){
  const std=STDS[currentStd];
  const C=std.col;
  const isLand=w>h, shorter=Math.min(w,h);
  const symPx=Math.round(shorter*.42), fs=Math.max(9,Math.round(shorter*.068));
  const fsS=Math.max(8,Math.round(shorter*.054)), pad=Math.round(shorter*.07);
  const bdr=Math.max(2,Math.round(shorter/70));
  const isISO=['iso','uk','eu'].includes(currentStd);

  if(cat==='panel') return buildPanel(s,v,w,h,C);

  if(isISO) return buildISO(s,cat,v,w,h,C,{symPx,fs,fsS,pad,bdr,isLand,shorter});
  return buildANSI(s,cat,v,w,h,C,{symPx,fs,fsS,pad,bdr,isLand,shorter});
}

function buildISO(s,cat,v,w,h,C,m){
  const {symPx,fs,fsS,pad,bdr,isLand}=m;
  const text=(v.text||'').trim(), sub=(v.sub||'').trim();
  const textDiv=text?`<div style="font-size:${fs}px;font-weight:700;text-align:center;padding:${Math.round(pad/2)}px ${pad}px;line-height:1.35">${esc(text)}</div>`:'';
  const subDiv=sub?`<div style="font-size:${fsS}px;font-weight:600;text-align:center;opacity:.85;padding:0 ${pad}px ${Math.round(pad/2)}px">${esc(sub)}</div>`:'';
  const bdrR=bdr*2;

  if(cat==='warning'){
    const triW=isLand?Math.round(h*1.1):Math.round(w*.78);
    const triH=Math.round(triW*.87);
    const body=isLand
      ?`display:flex;flex-direction:row;align-items:center;gap:${pad}px;padding:${pad}px;`
      :`display:flex;flex-direction:column;align-items:center;padding:${pad}px;gap:${Math.round(pad/3)}px;`;
    return `<div style="width:${w}px;height:${h}px;background:${C.yellow};font-family:Arial,Helvetica,sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden;border:${bdrR}px solid ${C.black}">
      <div style="${body}">
        <div style="position:relative;flex-shrink:0;width:${triW}px;height:${triH}px">
          <svg viewBox="0 0 100 87" width="${triW}" height="${triH}" style="position:absolute;top:0;left:0">
            <polygon points="50,5 96,82 4,82" fill="${C.yellow}" stroke="${C.black}" stroke-width="6" stroke-linejoin="round"/>
          </svg>
          <div style="position:absolute;top:52%;left:50%;transform:translate(-50%,-50%)">${svg(s.sym,C.black,Math.round(triW*.5))}</div>
        </div>
        <div style="color:${C.black}">${textDiv}${subDiv}</div>
      </div></div>`;
  }
  if(cat==='prohibition'){
    const circPx=Math.round(Math.min(w,h)*.58);
    const layout=isLand
      ?`display:flex;flex-direction:row;align-items:center;padding:${pad}px;gap:${pad}px;`
      :`display:flex;flex-direction:column;align-items:center;padding:${pad}px;gap:${Math.round(pad/2)}px;`;
    return `<div style="width:${w}px;height:${h}px;background:${C.white};font-family:Arial,Helvetica,sans-serif;${layout}border:${bdrR}px solid ${C.red};overflow:hidden">
      <div style="position:relative;flex-shrink:0;width:${circPx}px;height:${circPx}px">
        <svg viewBox="0 0 100 100" width="${circPx}" height="${circPx}" style="position:absolute">
          <circle cx="50" cy="50" r="46" fill="${C.white}" stroke="${C.red}" stroke-width="10"/>
        </svg>
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)">${svg(s.sym,C.black,Math.round(circPx*.5))}</div>
        <svg viewBox="0 0 100 100" width="${circPx}" height="${circPx}" style="position:absolute;top:0;left:0;pointer-events:none">
          <line x1="20" y1="20" x2="80" y2="80" stroke="${C.red}" stroke-width="10"/>
        </svg>
      </div>
      <div style="color:${C.black}">${textDiv}${subDiv}</div></div>`;
  }
  if(cat==='mandatory'){
    if(!isLand){
      return `<div style="width:${w}px;height:${h}px;background:${C.blue};font-family:Arial,Helvetica,sans-serif;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:${Math.round(pad/2)}px;overflow:hidden">
        ${svg(s.sym,C.white,symPx)}<div style="color:${C.white}">${textDiv}${subDiv}</div></div>`;
    }
    return `<div style="width:${w}px;height:${h}px;background:${C.blue};font-family:Arial,Helvetica,sans-serif;display:flex;flex-direction:row;align-items:center;padding:${pad}px;gap:${pad}px;overflow:hidden">
      <div style="flex-shrink:0;width:${Math.round(h*.8)}px;height:${Math.round(h*.8)}px;border-radius:50%;display:flex;align-items:center;justify-content:center">${svg(s.sym,C.white,Math.round(h*.5))}</div>
      <div style="color:${C.white}">${textDiv}${subDiv}</div></div>`;
  }
  if(cat==='safe'){
    const layout=isLand
      ?`display:flex;flex-direction:row;align-items:center;padding:${pad}px;gap:${pad}px;`
      :`display:flex;flex-direction:column;align-items:center;padding:${pad}px;gap:${Math.round(pad/2)}px;`;
    return `<div style="width:${w}px;height:${h}px;background:${C.green};font-family:Arial,Helvetica,sans-serif;${layout}overflow:hidden">
      <div style="flex-shrink:0">${svg(s.sym,C.white,symPx)}</div>
      <div style="color:${C.white};border-${isLand?'left':'top'}:2px solid rgba(255,255,255,.3);padding-${isLand?'left':'top'}:${Math.round(pad/2)}px">${textDiv}${subDiv}</div></div>`;
  }
  if(cat==='fire'){
    const layout=isLand
      ?`display:flex;flex-direction:row;align-items:center;padding:${pad}px;gap:${pad}px;`
      :`display:flex;flex-direction:column;align-items:center;padding:${pad}px;gap:${Math.round(pad/2)}px;`;
    return `<div style="width:${w}px;height:${h}px;background:${C.red};font-family:Arial,Helvetica,sans-serif;${layout}overflow:hidden">
      <div style="flex-shrink:0">${svg(s.sym,C.white,symPx)}</div>
      <div style="color:${C.white};border-${isLand?'left':'top'}:2px solid rgba(255,255,255,.3);padding-${isLand?'left':'top'}:${Math.round(pad/2)}px">${textDiv}${subDiv}</div></div>`;
  }
  return '';
}

function buildANSI(s,cat,v,w,h,C,m){
  const {fs,fsS,pad,isLand}=m;
  const rule=STDS[currentStd].rules?.[cat]||{};
  const hc=rule.headerColor||C.red;
  const ht=rule.headerText||'#fff';
  const sw=rule.signalWord||cat.toUpperCase();
  const hdrFs=Math.max(10,Math.round(Math.min(w,h)*.09));
  const symPxA=Math.round(Math.min(w,h)*.32);
  const msg=(v.msg||v.text||'').trim();
  const avoid=(v.avoid||v.loc||v.sub||'').trim();
  const addAlert=(sw!=='NOTICE'&&sw!=='SAFETY');
  const alertS=addAlert?alertSym(Math.round(hdrFs*1.1),ht):'';
  const layout=isLand?'row':'column';
  return `<div style="width:${w}px;height:${h}px;background:#fff;font-family:Arial,Helvetica,sans-serif;display:flex;flex-direction:column;border:2px solid ${hc};overflow:hidden">
    <div style="background:${hc};color:${ht};font-weight:900;font-size:${hdrFs}px;letter-spacing:.12em;padding:${Math.round(pad/2)}px ${pad}px;display:flex;align-items:center;gap:6px;flex-shrink:0">
      ${alertS}<span>${sw}</span>
    </div>
    <div style="flex:1;display:flex;flex-direction:${layout};align-items:center;padding:${pad}px;gap:${pad}px;overflow:hidden">
      <div style="flex-shrink:0">${svg(s.sym,hc,symPxA)}</div>
      <div style="border-${isLand?'left':'top'}:2px solid #ddd;padding-${isLand?'left':'top'}:${Math.round(pad/2)}px;display:flex;flex-direction:column;gap:${Math.round(pad/3)}px">
        ${msg?`<div style="font-size:${fs}px;font-weight:700;color:#0A0A0A;line-height:1.35">${nl(msg)}</div>`:''}
        ${avoid?`<div style="font-size:${fsS}px;font-weight:500;color:#333;line-height:1.35">${nl(avoid)}</div>`:''}
      </div>
    </div></div>`;
}

function buildPanel(s,v,w,h,C){
  const t=s.type;
  const fs=Math.max(9,Math.round(w/18));
  const fsS=Math.max(8,Math.round(w/22));
  const fsH=Math.max(8,Math.round(w/20));
  const fsI=Math.max(14,Math.round(w/8));
  const bd=Math.max(2,Math.round(w/80));
  const p=Math.max(4,Math.round(w/18));
  const sz=`width:${w}px;height:${h}px;`;
  const B=`${sz}display:flex;flex-direction:column;font-family:Arial,Helvetica,sans-serif;overflow:hidden;`;
  const STR=`repeating-linear-gradient(-45deg,rgba(0,0,0,.13) 0,rgba(0,0,0,.13) 14px,transparent 14px,transparent 28px)`;
  if(t==='door-warning')
    return `<div style="${B}background:${C.yellow};border:${bd*2}px solid ${C.black};position:relative">
      <div style="position:absolute;inset:0;background:${STR}"></div>
      <div style="background:${C.black};color:${C.yellow};font-weight:900;font-size:${fsH}px;letter-spacing:.18em;padding:${p/2}px ${p}px;text-align:center;position:relative;z-index:2">⚡ DANGER — ${esc(v.voltage)}</div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:${p}px;border:${bd}px solid ${C.black};margin:${bd}px;background:${C.yellow};position:relative;z-index:2;gap:${p/2}px">
        <div style="font-size:${fs}px;font-weight:900;color:${C.black};text-align:center">${nl(v.main)}</div>
        <div style="font-size:${fsS}px;font-weight:600;color:#333;text-align:center">${nl(v.sub)}</div>
      </div></div>`;
  if(t==='circuit-id')
    return `<div style="${B}background:${C.white};border:${bd}px solid ${C.black}">
      <div style="background:${C.black};color:${C.white};font-weight:900;font-size:${fsH}px;letter-spacing:.12em;padding:${p/2}px ${p}px;text-align:center">CIRCUIT ID</div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:${p}px;gap:${p/2}px">
        <div style="font-size:${fsI}px;font-weight:900;color:${C.black}">${esc(v.id)}</div>
        <div style="font-size:${fs}px;font-weight:700;color:${C.black};text-align:center">${esc(v.desc)}</div>
        <div style="font-size:${Math.round(fs*1.15)}px;font-weight:900;color:${C.red}">${esc(v.amps)}</div>
      </div></div>`;
  if(t==='breaker-label')
    return `<div style="${B}background:${C.white};border:${bd}px solid ${C.black}">
      <div style="background:${C.black};color:${C.white};font-weight:900;font-size:${fsH}px;letter-spacing:.13em;padding:${p/2}px ${p}px;text-align:center">${esc(v.panel)}</div>
      <div style="flex:1;padding:${p}px;display:flex;flex-direction:column;justify-content:center;gap:${p/2}px">
        <div style="font-size:${fs}px;font-weight:700;color:${C.black}">${esc(v.location)}</div>
        <div style="font-size:${fs}px;font-weight:700;color:${C.red}">${esc(v.voltage)}</div>
        <div style="display:flex;gap:2px;margin-top:${p/2}px">${['L1','L2','L3','N','E'].map((l,i)=>`<div style="flex:1;background:${i<4?C.yellow:'#ddd'};border:1px solid ${C.black};font-size:${fsS}px;font-weight:700;color:${C.black};text-align:center;padding:3px 1px">${l}</div>`).join('')}</div>
      </div></div>`;
  if(t==='lockout')
    return `<div style="${B}background:${C.yellow};border:${bd*2}px solid ${C.black};position:relative">
      <div style="position:absolute;inset:0;background:${STR}"></div>
      <div style="background:${C.black};color:${C.yellow};font-weight:900;font-size:${fsH}px;letter-spacing:.14em;padding:${p/2}px ${p}px;text-align:center;position:relative;z-index:2">🔒 LOCKOUT / TAGOUT</div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:${p}px;border:${bd}px solid ${C.black};margin:${bd}px;background:${C.yellow};position:relative;z-index:2;gap:${p/2}px">
        <div style="font-size:${fs}px;font-weight:900;color:${C.black};text-align:center">${nl(v.main)}</div>
        <div style="font-size:${fsS}px;font-weight:600;color:#333;text-align:center">${nl(v.sub)}</div>
        ${v.ref?`<div style="background:${C.black};color:${C.yellow};font-size:${fsS}px;font-weight:700;padding:2px ${p}px;margin-top:${p/2}px">${esc(v.ref)}</div>`:''}
      </div></div>`;
  if(t==='arc-flash')
    return `<div style="${B}background:${C.white};border:${bd*2}px solid ${C.red}">
      <div style="background:${C.red};color:${C.white};font-weight:900;font-size:${fsH}px;letter-spacing:.1em;padding:${p/2}px ${p}px;text-align:center">⚡ ARC FLASH HAZARD</div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:${p}px;gap:${p/2}px">
        <div style="font-size:${fsI}px;font-weight:900;color:${C.red}">${esc(v.voltage)}</div>
        <div style="font-size:${fs}px;font-weight:700;color:${C.black}">Arc boundary: ${esc(v.boundary)}</div>
        <div style="font-size:${fsS}px;font-weight:600;color:#444;text-align:center">${esc(v.ppe)}</div>
        ${v.ref?`<div style="font-size:${fsS}px;color:#777;margin-top:${p/2}px">${esc(v.ref)}</div>`:''}
      </div></div>`;
  if(t==='isolator')
    return `<div style="${B}background:${C.white};border:${bd}px solid ${C.blue}">
      <div style="background:${C.blue};color:${C.white};font-weight:900;font-size:${fsH}px;letter-spacing:.12em;padding:${p/2}px ${p}px;text-align:center">ISOLATOR / SWITCH</div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:${p}px;gap:${p/2}px">
        <div style="font-size:${fsI}px;font-weight:900;color:${C.blue}">${esc(v.id)}</div>
        <div style="font-size:${fs}px;font-weight:700;color:${C.black};text-align:center">${esc(v.desc)}</div>
        <div style="font-size:${Math.round(fs*1.1)}px;font-weight:900;color:${C.red}">${esc(v.voltage)}</div>
      </div></div>`;
  if(t==='consumer-unit')
    return `<div style="${B}background:${C.white};border:${bd}px solid ${C.black}">
      <div style="background:${C.black};color:${C.white};font-weight:900;font-size:${fsH}px;letter-spacing:.12em;padding:${p/2}px ${p}px;text-align:center">CONSUMER UNIT</div>
      <div style="flex:1;padding:${p}px;display:flex;flex-direction:column;justify-content:center;gap:${p/2}px">
        <div style="font-size:${fs}px;font-weight:700;color:${C.black}">${esc(v.address)}</div>
        <div style="font-size:${fs}px;font-weight:700;color:${C.red}">${esc(v.supply)}</div>
        <div style="font-size:${fsS}px;color:#555">Installed: ${esc(v.install)}</div>
        ${v.cert?`<div style="font-size:${fsS}px;color:#777">Cert: ${esc(v.cert)}</div>`:''}
      </div></div>`;
  if(t==='no-access')
    return `<div style="${B}background:${C.white};border:${bd*2}px solid ${C.red}">
      <div style="background:${C.red};color:${C.white};font-weight:900;font-size:${fsH}px;letter-spacing:.15em;padding:${p/2}px ${p}px;text-align:center">⛔ NO ACCESS</div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:${p}px;gap:${p/2}px">
        <div style="font-size:${fs}px;font-weight:900;color:${C.red};text-align:center">${nl(v.main)}</div>
        <div style="font-size:${fsS}px;font-weight:600;color:#990000;text-align:center">${nl(v.sub)}</div>
      </div></div>`;
  return '';
}

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
let currentStd='iso', currentCat='warning', selectedSign=null;

function getVals(s){
  const v={};
  s.fields.forEach(f=>{const el=document.getElementById('inp-'+f.k);v[f.k]=el?el.value:f.v;});
  return v;
}
function getSize(){
  const a=document.querySelector('.sz-btn.active');
  if(!a) return{w:200,h:200};
  if(a.id==='sz-c') return{w:parseInt(document.getElementById('csz-w').value)||200,h:parseInt(document.getElementById('csz-h').value)||200};
  return{w:parseInt(a.dataset.w),h:parseInt(a.dataset.h)};
}
function pickSize(btn){
  document.querySelectorAll('.sz-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('csz-row').style.display=btn.id==='sz-c'?'flex':'none';
  doLive();
}
function getOrient(){return document.querySelector('.ori-btn.active')?.dataset.o||'portrait'}
function pickOrient(btn){
  document.querySelectorAll('.ori-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');doLive();
}
function doLive(){
  if(document.getElementById('out-sec')?.style.display!=='none') generatePreview();
}

/* ═══════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════ */
function setStd(std){
  currentStd=std; selectedSign=null;
  document.querySelectorAll('.std-tab').forEach(t=>t.classList.toggle('active',t.dataset.std===std));
  const signs=makeSigns(std);
  const cats=makeCats(std);
  const firstCat=Object.keys(cats)[0];
  currentCat=firstCat;
  buildSidebar(cats,signs);
  renderGrid(firstCat,signs,cats);
  resetEditorEmpty();
}

function buildSidebar(cats,signs){
  const bar=document.getElementById('cat-bar');
  bar.innerHTML='';
  Object.entries(cats).forEach(([key,c])=>{
    const count=(signs[key]||[]).length;
    const btn=document.createElement('button');
    btn.className='cat-btn'+(key===currentCat?' active':'');
    btn.dataset.cat=key;
    btn.innerHTML=`<span class="cat-dot" style="background:${c.dot}"></span>${c.label}<span class="cat-count">${count}</span>`;
    btn.onclick=()=>{
      currentCat=key;selectedSign=null;
      document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===key));
      renderGrid(key,makeSigns(currentStd),makeCats(currentStd));
      resetEditorEmpty();
    };
    bar.appendChild(btn);
  });
}

function renderGrid(cat,signs,cats){
  const main=document.getElementById('main');
  const std=STDS[currentStd];
  main.innerHTML='';

  const infoBar=document.createElement('div');
  infoBar.className='std-info-bar';
  infoBar.style.cssText=`background:${std.infoBg};border-color:${std.infoBorder};color:${std.infoText}`;
  infoBar.innerHTML=`<strong style="display:block;margin-bottom:2px">${std.name} — ${std.full}</strong>${std.note}`;
  main.appendChild(infoBar);

  const gh=document.createElement('div');
  gh.className='grid-hdr';
  gh.textContent=(cats[cat]?.label||cat)+' signs';
  main.appendChild(gh);

  const grid=document.createElement('div');
  grid.className='sign-grid';
  const isISO=['iso','uk','eu'].includes(currentStd);
  const col=std.col;
  (signs[cat]||[]).forEach(s=>{
    const card=document.createElement('div');
    card.className='sign-card'; card.id='card-'+s.id;
    const prev=document.createElement('div');
    prev.className='sign-prev'+(cat==='panel'?' wide':'');
    prev.innerHTML=cat==='panel'?thumbPanel(s):(isISO?thumbISO(s,cat,col):thumbANSI(s,col));
    const lbl=document.createElement('div'); lbl.className='sign-lbl'; lbl.textContent=s.label;
    const ref=document.createElement('div'); ref.className='sign-ref'; ref.textContent=s.code;
    card.appendChild(prev); card.appendChild(lbl); card.appendChild(ref);
    card.addEventListener('click',()=>selectSign(s,cat));
    grid.appendChild(card);
  });
  main.appendChild(grid);
}

function selectSign(s,cat){
  selectedSign={s,cat};
  document.querySelectorAll('.sign-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('card-'+s.id)?.classList.add('selected');
  document.getElementById('ed-title').textContent=s.label;
  document.getElementById('ed-ref').textContent=STDS[currentStd].name+' · ref: '+s.code;
  const fH=s.fields.map(f=>`
    <div class="fgrp">
      <label for="inp-${f.k}">${f.l}</label>
      <textarea id="inp-${f.k}" rows="${f.v.includes('\n')?3:2}" oninput="doLive()">${f.v}</textarea>
    </div>`).join('');
  document.getElementById('ed-body').innerHTML=`
    ${fH}
    <p class="hint">New lines → line breaks on sign.</p>
    <hr class="div">
    <div class="fgrp">
      <label>Size</label>
      <div class="sz-row">
        <button class="sz-btn" data-w="60"  data-h="60"  onclick="pickSize(this)">XS<span>60px</span></button>
        <button class="sz-btn" data-w="100" data-h="100" onclick="pickSize(this)">S<span>100px</span></button>
        <button class="sz-btn active" data-w="180" data-h="180" onclick="pickSize(this)">M<span>180px</span></button>
        <button class="sz-btn" data-w="250" data-h="250" onclick="pickSize(this)">L<span>250px</span></button>
        <button class="sz-btn" data-w="350" data-h="350" onclick="pickSize(this)">XL<span>350px</span></button>
        <button class="sz-btn" id="sz-c" onclick="pickSize(this)">Custom</button>
      </div>
      <div class="csz" id="csz-row">
        <input type="number" id="csz-w" value="200" min="40" max="2000" oninput="doLive()">
        <span>×</span>
        <input type="number" id="csz-h" value="200" min="40" max="2000" oninput="doLive()">
        <span>px</span>
      </div>
    </div>
    <div class="fgrp">
      <label>Orientation</label>
      <div class="ori-row">
        <button class="ori-btn active" data-o="portrait"  onclick="pickOrient(this)">▯ Portrait</button>
        <button class="ori-btn"        data-o="landscape" onclick="pickOrient(this)">▭ Landscape</button>
        <button class="ori-btn"        data-o="square"    onclick="pickOrient(this)">□ Square</button>
      </div>
    </div>
    <hr class="div">
    <div class="btn-row">
      <button class="btn btn-p" onclick="generatePreview()">▶ Preview</button>
      <button class="btn btn-sm" onclick="resetFields()">Reset</button>
    </div>
    <div id="out-sec" class="out-sec" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em">Output</span>
        <span id="sz-read" style="font-size:9px;color:var(--muted);font-family:monospace"></span>
      </div>
      <div class="out-prev" id="out-prev"><div id="out-inner"></div></div>
      <div class="btn-row">
        <button class="btn btn-g btn-sm" id="cp-html" onclick="copyHTML()">⎘ Copy HTML</button>
        <button class="btn btn-g btn-sm" id="cp-attr" onclick="copyAttr()">⎘ data-sign</button>
      </div>
      <p class="hint">Inline-styled HTML — no external CSS needed. Drop straight into your mimic canvas.</p>
    </div>`;
}

function generatePreview(){
  if(!selectedSign) return;
  const{s,cat}=selectedSign;
  const v=getVals(s);
  let{w,h}=getSize();
  const o=getOrient();
  if(o==='landscape'&&h>w){const t=w;w=h;h=t;}
  if(o==='square') h=w;
  document.getElementById('out-sec').style.display='block';
  document.getElementById('out-inner').innerHTML=buildOutput(s,cat,v,w,h);
  document.getElementById('sz-read').textContent=`${w}×${h}px`;
}

function resetFields(){
  if(!selectedSign) return;
  selectedSign.s.fields.forEach(f=>{const el=document.getElementById('inp-'+f.k);if(el)el.value=f.v;});
  document.getElementById('out-sec').style.display='none';
}

function resetEditorEmpty(){
  document.getElementById('ed-title').textContent='Sign Builder';
  document.getElementById('ed-ref').textContent='';
  document.getElementById('ed-body').innerHTML=`<div class="empty-ed"><div class="ico">🖊️</div><p>Select a sign from the grid.<br>Edit text · pick size · set orientation<br>then copy the HTML into your mimic.</p></div>`;
}

function copyHTML(){
  const el=document.getElementById('out-inner');
  if(!el||!el.innerHTML.trim()) return;
  navigator.clipboard.writeText(el.innerHTML).then(()=>flash('cp-html','✔ Copied!','⎘ Copy HTML'));
}
function copyAttr(){
  if(!selectedSign) return;
  const{s,cat}=selectedSign; const v=getVals(s);
  let{w,h}=getSize(); const o=getOrient();
  if(o==='landscape'&&h>w){const t=w;w=h;h=t;} if(o==='square') h=w;
  const pl=JSON.stringify({std:currentStd,cat,code:s.code,id:s.id,width:w,height:h,orient:o,values:v});
  navigator.clipboard.writeText(`data-sign='${pl.replace(/'/g,"&apos;")}'`).then(()=>flash('cp-attr','✔ Copied!','⎘ data-sign'));
}
function flash(id,on,off){
  const b=document.getElementById(id);if(!b)return;
  b.textContent=on;setTimeout(()=>b.textContent=off,2000);
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
setStd('iso');

window.SignBuilder={
  getHTML:()=>document.getElementById('out-inner')?.innerHTML||'',
  getJSON:()=>{
    if(!selectedSign) return null;
    const{s,cat}=selectedSign; const v=getVals(s);
    let{w,h}=getSize();
    return{std:currentStd,cat,code:s.code,id:s.id,width:w,height:h,values:v};
  },
  onGenerate:null
};
</script>
